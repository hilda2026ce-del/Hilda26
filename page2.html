<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open in Browser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:#0f0f0f; color:white; display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; text-align:center; font-family:Arial;}
.loader { border:6px solid #333; border-top:6px solid #00ffcc; border-radius:50%; width:70px; height:70px; animation:spin 1s linear infinite; display:none;}
@keyframes spin {100%{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="guide">
  <h2>Open in browser</h2>
  <p>Tap menu (top right) → Open in browser</p>
</div>

<div class="loader" id="loader"></div>

<script>
var ua = navigator.userAgent.toLowerCase();

// vetëm kontroll minimal
if (!ua.includes("snapchat")) {
    // Browser real
    document.getElementById("guide").style.display = "none";
    document.getElementById("loader").style.display = "block";

    setTimeout(function(){
        window.location.href = "https://t.ajrkmx9.com/403824/8780/38462?aff_sub5=SF_006OG00000LCnYj&aff_sub3=TC_LW9H5CT9/?v=098";
    },2000);
}
// Snap → nuk bën asgjë (vetëm guide)
</script>

</body>
</html>
