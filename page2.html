    body {

    /* OVERLAY */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup {
      background: #fff;
      width: 90%;
      max-width: 400px;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    /* CLOSE BUTTON */
    .close {
      position: absolute;

    }

    img {
      width: 100%;
      border-radius: 10px;
      margin: 10px 0;
    }

    /* BUTTON */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      color: white;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:active {
      background: #28a745;
    }
  </style>
</head>
