<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 2</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: rgba(0,0,0,0.6);
    }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* LOADING CLEAN */
    .loading {
      text-align: center;
      color: #1e3a8a;
    }

    .loading h2 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* POPUP */
    .popup {
      display: none;
      background: #fff;
      width: 90%;
      max-width: 400px;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      position: relative;
    }

    .close {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      cursor: pointer;
      color: #888;
    }

    h1 {
      color: #1e3a8a;
    }

    p {
      color: #444;
    }

    .steps {
      text-align: left;
      margin: 15px 0;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin: 10px 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border-radius: 30px;
      border: none;
      color: white;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      cursor: pointer;
    }

    .btn:active {
      background: #28a745;
    }
  </style>
</head>
<body>

<div class="overlay">

  <!-- LOADING -->
  <div id="loading" class="loading">
    <h2>QUEEN CHLOE</h2>
    <div class="loader"></div>
  </div>

  <!-- POPUP -->
  <div id="popup" class="popup">

    <div class="close" onclick="goBack()">✕</div>

    <h1>QUEEN CHLOE</h1>

    <p>Watch my content for Free in 'Jerkmate'</p>

    <div class="steps">
      <p>1- Create a free Jerkmate account</p>
      <p>2- Get the free Lifetime Membership</p>
      <p>3- Enjoy me and thousands of more models</p>
    </div>

    <a href="https://t.ajrkmx1.com/403824/8865/0?bo=2779,2778,2777,2776,2775&file_id=605338&po=6533&aff_sub5=SF_006OG000004lmDN&aff_sub4=AT_0002" target="_blank">
      <img src="https://www.imglnkx.com/8865/HawkTuah_Banners_GinaValentina_v1_300100.gif">
    </a>

    <button class="btn" onclick="goLink()">
      <i class="fa-solid fa-arrow-right"></i>
      Join for Free
    </button>

  </div>

</div>

<script>
  function goBack() {
    window.history.back();
  }

  function goLink() {
    window.location.href = "https://t.ajrkmx1.com/403824/8865/0?bo=2779,2778,2777,2776,2775&file_id=605338&po=6533&aff_sub5=SF_006OG000004lmDN";
  }

  // 1.5 sekonda loading
  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.getElementById("popup").style.display = "block";
  }, 1500);
</script>

</body>
</html>
