<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your surprise here🎁✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  background:#0f0f0f;
  color:black;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  flex-direction:column;
  padding:20px;
  position: relative;
}

/* CONTAINER për butonat */
.buttons {
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
  max-width:300px;
}

/* BUTONET transparent */
.btn {
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding:15px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.3);
  font-weight:bold;
}

/* tekst highlight */
.highlight {
  color:#00ffcc;
}

/* FOTO BACKGROUND */
.bg {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0;
  transition: opacity 1s ease;
}

.bg.active {
  opacity:1;
}

/* Gishti */
.hand-pointer {
  position: absolute;
  top:20px;
  right:20px;
  font-size:40px;
  color:#00ffcc;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
</style>
</head>

<body>

<!-- FOTO 1 -->
<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg" class="bg active">

<!-- FOTO 2 -->
<img src="https://i.ibb.co/TMLxntx3/IMG-2631.jpg" class="bg">

<div class="hand-pointer">👆</div>

<!-- 4 BUTONAT -->
<div class="buttons">
  <div class="btn">Open in your browser</div>
  <div class="btn">Tap the 3 dots (…) in the top right corner</div>
  <div class="btn">Then select</div>
  <div class="btn highlight">"Open in browser"</div>
</div>

<script>
var ua = navigator.userAgent.toLowerCase();

// slideshow çdo 3.5 sekonda
let images = document.querySelectorAll('.bg');
let index = 0;

setInterval(function() {
  images[index].classList.remove('active');
  index = (index + 1) % images.length;
  images[index].classList.add('active');
}, 3500);

// redirect vetëm jashtë snapchat
if (!ua.includes("snapchat")) {
    window.location.href = "page2.html";
}
</script>

</body>
</html>
