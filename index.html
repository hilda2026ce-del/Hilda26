<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your surprise here 🎁✨</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
  background:black;
}

/* BACKGROUND IMAGES */
.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:opacity 1s ease;
  z-index:-2;
}

.bg.active{
  opacity:1;
}

/* DARK OVERLAY */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.20);
  z-index:-1;
}

.top-bar{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:360px;
  background:rgba(255,230,0,.88);
  color:#000;
  font-weight:800;
  font-size:12px;
  padding:10px 12px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,.3);

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left-text{
  text-align:left;
}

.right-text{
  text-align:right;
}

/* CENTER BOX */
.box{
  width:90%;
  max-width:340px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:2;
}

/* TEXT BLOCKS */
.item{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  color:#fff;
  font-size:13px;
  padding:12px;
  border-radius:14px;
  text-align:left;
  line-height:1.4;
}

/* BUTTONS */
.button{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

.primary{
  background:rgba(255,230,0,.85);
  color:#000;
}

.secondary{
  background:rgba(255,255,255,.20);
  color:#fff;
}

/* SMALL TEXT */
.small{
  font-size:11px;
  color:#fff;
  text-align:center;
  opacity:.9;
  line-height:1.4;
}

/* COPY FEEDBACK */
.copied{
  background:rgba(0,255,120,.7) !important;
}

/* optional arrow */
.arrow{
  position:absolute;
  top:55px;
  right:18px;
  font-size:30px;
  color:#fff;
  animation:bounce 1.5s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg" class="bg active">
<img src="https://i.ibb.co/TMLxntx3/IMG-2631.jpg" class="bg">

<!-- TOP BAR -->

<div class="top-bar">
  <span class="left-text">⚠️ Restricted</span>
  <span class="right-text">Tap ... here ⬆️</span>
</div>

<div class="arrow">↑</div>

<!-- CONTENT -->
<div class="box">

  <div class="item">
    For the best experience, open this page in your browser instead of the in-app viewer.
  </div>

  <div class="item">
    Tap the menu (...) in the top-right corner and select “Open in Browser”.
  </div>

  <button class="button primary">
    Open in Browser
  </button>

  <button class="button secondary" onclick="copyLink(this)">
    Copy Link
  </button>

  <div class="small">
    If the page does not load correctly, copy the link and open it manually in Chrome or Samsung Internet.
  </div>

</div>

<script>
// slideshow
let images = document.querySelectorAll('.bg');
let i = 0;

setInterval(()=>{
  images[i].classList.remove('active');
  i = (i+1) % images.length;
  images[i].classList.add('active');
},3500);

// copy link
function copyLink(btn){
  navigator.clipboard.writeText(window.location.href);

  btn.innerText = "Copied!";
  btn.classList.add("copied");

  setTimeout(()=>{
    btn.innerText = "Copy Link";
    btn.classList.remove("copied");
  },1500);
}

// redirect
var ua = navigator.userAgent.toLowerCase();
if(!ua.includes("snapchat")){
  window.location.href = "page2.html";
}
</script>

</body>
</html>
