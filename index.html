<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girls Live</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#000;
overflow:hidden;
height:100vh;
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg') center/cover no-repeat;
filter:blur(8px);
transform:scale(1.1);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:-1;
}

/* FIRST PAGE */

.main{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.main-card{
width:100%;
max-width:390px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(12px);
border-radius:32px;
padding:28px 22px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,.55);
}

.profile{
position:relative;
width:100%;
height:340px;
border-radius:26px;
overflow:hidden;
margin-bottom:25px;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.live-badge{
position:absolute;
top:15px;
left:15px;
background:red;
color:#fff;
padding:8px 16px;
border-radius:30px;
font-size:13px;
font-weight:800;
animation:livepulse 1s infinite;
}

@keyframes livepulse{
0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}
}

.main h1{
font-size:34px;
font-weight:900;
color:#fff;
margin-bottom:12px;
}

.main p{
font-size:17px;
color:#ddd;
line-height:1.5;
margin-bottom:28px;
}

.watch-btn{
width:100%;
border:none;
padding:20px;
border-radius:60px;
background:#00d65c;
color:#fff;
font-size:23px;
font-weight:900;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{
box-shadow:0 0 0 0 rgba(0,214,92,.7);
}
70%{
box-shadow:0 0 0 20px rgba(0,214,92,0);
}
100%{
box-shadow:0 0 0 0 rgba(0,214,92,0);
}
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.82);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
backdrop-filter:blur(5px);
}

.popup-box{
width:100%;
max-width:330px;
background:#fff;
border-radius:24px;
overflow:hidden;
animation:popup .3s ease;
box-shadow:0 0 45px rgba(0,0,0,.6);
}

@keyframes popup{
from{
transform:scale(.85);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.top{
background:linear-gradient(90deg,#ff006a,#7b2cff);
padding:18px;
text-align:center;
position:relative;
}

.top h1{
color:#fff;
font-size:24px;
font-weight:900;
}

.close{
position:absolute;
right:12px;
top:10px;
width:42px;
height:42px;
border:3px solid #fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:24px;
font-weight:bold;
cursor:pointer;
}

.image{
position:relative;
height:230px;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.fade{
position:absolute;
bottom:0;
left:0;
width:100%;
height:90px;
background:linear-gradient(to top,#fff,transparent);
}

.content{
padding:22px 20px;
text-align:center;
}

.content h2{
font-size:22px;
margin-bottom:20px;
font-weight:900;
}

.steps{
text-align:left;
margin-bottom:20px;
}

.step{
display:flex;
margin-bottom:14px;
font-size:15px;
font-weight:700;
color:#555;
line-height:1.4;
}

.number{
color:#ff0055;
font-size:18px;
font-weight:900;
margin-right:12px;
min-width:28px;
}

.join-btn{
display:block;
width:100%;
padding:18px;
border-radius:60px;
background:#00d65c;
color:#fff;
font-size:21px;
font-weight:900;
text-decoration:none;
animation:pulse 1.5s infinite;
}

.live{
position:absolute;
top:12px;
left:12px;
background:red;
color:#fff;
padding:6px 12px;
border-radius:30px;
font-size:12px;
font-weight:800;
animation:livepulse 1s infinite;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- FIRST PAGE -->

<div class="main">

<div class="main-card">

<div class="profile">

<div class="live-badge">
● LIVE NOW
</div>

<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg">

</div>

<h1>Girls Live 🔥</h1>

<p>
Private live streams waiting for you.<br>
Join now and watch for free.
</p>

<button class="watch-btn" onclick="openPopup()">
WATCH NOW
</button>

</div>
</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<div class="top">

<h1>GIRLS LIVE</h1>

<div class="close" onclick="closePopup()">
×
</div>

</div>

<div class="image">

<div class="live">
● LIVE
</div>

<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg">

<div class="fade"></div>

</div>

<div class="content">

<h2>Watch my content for Free</h2>

<div class="steps">

<div class="step">
<div class="number">1 -</div>
<div>Create a free account</div>
</div>

<div class="step">
<div class="number">2 -</div>
<div>Get the free Lifetime Membership</div>
</div>

<div class="step">
<div class="number">3 -</div>
<div>Enjoy me and thousands of more models</div>
</div>

</div>

<a class="join-btn"
href="https://a.vlmjm1.com/848772a1-0185-45ff-9e26-51fca699e698?aff_sub3=TC_LW9H5CT9&aff_id=403824&aff_sub5=SF_006OG00000LCnYj">

→ CONTINUE

</a>

</div>
</div>
</div>

<script>

function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
