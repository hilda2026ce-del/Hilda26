<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
}

/* FOTO */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("https://i.imgur.com/CqtgSA5.jpeg") center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
}

.play{
width:90px;
height:90px;
background:rgba(0,0,0,0.6);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
color:white;
}

/* BUTTON FAQJA 1 */
#startBtn{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
padding:18px 35px;
font-size:22px;
background:green;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 15px lime;
}

/* POPUP 18+ */
#popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:999;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
}

#popup button{
padding:15px 30px;
margin-top:20px;
font-size:20px;
background:red;
color:white;
border:none;
border-radius:15px;
}

/* HOLD BUTTON */
.btn{
display:none;
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
background:#ff1a1a;
color:white;
padding:22px 35px;
font-size:24px;
font-weight:bold;
border-radius:20px;
text-decoration:none;
box-shadow:0 0 20px red;
animation:shake 0.6s infinite;
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(-50%,0)}
25%{transform:translate(-53%,0)}
50%{transform:translate(-47%,0)}
75%{transform:translate(-53%,0)}
100%{transform:translate(-50%,0)}
}

/* MENU DIREKT */
#menu{
display:none;
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:20px;
border-top-left-radius:20px;
border-top-right-radius:20px;
text-align:center;
z-index:1000;
}

.menuBtn{
display:block;
width:90%;
margin:10px auto;
padding:15px;
font-size:18px;
background:#333;
color:white;
border:none;
border-radius:10px;
}
</style>

</head>
<body>

<!-- FOTO -->
<div class="player">
  <div class="play">▶</div>
</div>

<!-- FAQJA 1 -->
<button id="startBtn">Click & Continue 😋✨</button>

<!-- POPUP 18+ -->
<div id="popup">
  <h2>Are you 18+?</h2>
  <button id="yesBtn">Yes, continue 🔞</button>
</div>

<!-- HOLD BUTTON -->
<a class="btn" 
href="https://t.ajrkmx1.com/403824/8780/0?aff_sub=Indrit17&bo=2779,2778,2777,2776,2775&source=Indrit17&po=6533&aff_sub5=SF_006OG000004lmDN"
onclick="return false;">
Press & Hold to Watch 🔞
</a>

<!-- MENU -->
<div id="menu">
<h3 style="color:white;">Open With</h3>
<button class="menuBtn" onclick="window.location.href='https://t.ajrkmx1.com/403824/8780/0?aff_sub=Indrit17&bo=2779,2778,2777,2776,2775&source=Indrit17&po=6533&aff_sub5=SF_006OG000004lmDN'">Google</button>
<button class="menuBtn" onclick="window.location.href='https://t.ajrkmx1.com/403824/8780/0?aff_sub=Indrit17&bo=2779,2778,2777,2776,2775&source=Indrit17&po=6533&aff_sub5=SF_006OG000004lmDN'">Browser</button>
</div>

<script>
// STEP 1 -> Click & Continue
document.getElementById("startBtn").onclick = function(){
this.style.display="none";
document.getElementById("popup").style.display="flex";
};

// STEP 2 -> Popup 18+
document.getElementById("yesBtn").onclick = function(){
document.getElementById("popup").style.display="none";
document.querySelector(".btn").style.display="block";
};

// STEP 3 -> HOLD 2 sekonda, hap direkt MENU
let holdBtn = document.querySelector(".btn");
let timer;

function startHold(){
timer = setTimeout(()=>{
document.getElementById("menu").style.display="block";
},2000);
}

function cancelHold(){
clearTimeout(timer);
}

holdBtn.addEventListener("mousedown", startHold);
holdBtn.addEventListener("touchstart", startHold);
holdBtn.addEventListener("mouseup", cancelHold);
holdBtn.addEventListener("mouseleave", cancelHold);
holdBtn.addEventListener("touchend", cancelHold);
</script>

</body>
</html>
