<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <title>Faqja 1</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    img {
      max-width: 100%;
    }

    .main-img {
      width: 300px;
      margin-bottom: 15px;
    }

    .banner img {
      width: 300px;
      height: auto;
    }

    .buttons {
      margin: 20px 0;
    }

    .btn {
      display: block;
      width: 220px;
      margin: 10px auto;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff; /* blu */
      color: white;
      transition: 0.2s;
    }

    .btn:active {
      background: #28a745; /* jeshile kur shtypet */
    }

    .slider img {
      width: 300px;
      display: none;
      margin-top: 15px;
    }

    .slider img.active {
      display: block;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 1. Foto kryesore -->
  <img src="https://i.imgur.com/mVPRhRJ.jpeg" class="main-img">

  <!-- 2. Banner -->
  <div class="banner">
    <a href="https://t.ajrkmx1.com/403824/8865/0?bo=2779,2778,2777,2776,2775&file_id=606055&po=6533&aff_sub5=SF_006OG000004lmDN&aff_sub4=AT_0002" target="_blank">
      <img src="https://www.imglnkx.com/8865/DESIGN-19806_Neon_300100_6.gif">
    </a>
  </div>

  <!-- 3. Dy butona -->
  <div class="buttons">
    <button class="btn" onclick="goPage2()">PO</button>
    <button class="btn" onclick="goPage2()">JO</button>
  </div>

  <!-- 4. Slider -->
  <div class="slider">
    <img src="https://i.imgur.com/tjC5eLP.jpeg" class="active">
    <img src="https://i.imgur.com/IuYWULv.jpeg">
    <img src="https://i.imgur.com/C5zxsQF.jpeg">
  </div>

</div>

<script>
  function goPage2() {
    window.location.href = "page2.html";
  }

  let index = 0;
  const images = document.querySelectorAll(".slider img");

  setInterval(() => {
    images[index].classList.remove("active");
    index = (index + 1) % images.length;
    images[index].classList.add("active");
  }, 3000);
</script>

</body>
</html>
