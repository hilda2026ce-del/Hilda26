<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obilbil</title>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 15px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    .banner {
      margin: 15px 0;
      pointer-events: none;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 30px;
      color: white;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      cursor: pointer;
      font-size: 16px;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 300px;
      margin-top: 15px;
      border-radius: 15px;
      overflow: hidden;
    }

    .slider img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .slider img.active {
      opacity: 1;
    }

    /* POPUP */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .popup {
      background: #fff;
      width: 90%;
      max-width: 330px;
      border-radius: 20px;
      padding: 25px 20px;
      text-align: center;
      position: relative;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    .popup::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: #2563eb;
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 15px;
      font-size: 18px;
      cursor: pointer;
      color: #aaa;
    }

    .loader {
      width: 45px;
      height: 45px;
      border: 5px solid #ddd;
      border-top: 5px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .content {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <img src="https://i.imgur.com/fA1247E.jpg">

  <div class="banner">
    <img src="https://www.imglnkx.com/8865/DESIGN-19806_Neon_300100_6.gif">
  </div>

  <button class="btn" onclick="openPopup()">Continue</button>
  <button class="btn" onclick="openPopup()">Watch Now</button>

  <div class="slider">
    <img src="https://i.imgur.com/c7cIdHn.jpg" class="active">
    <img src="https://i.imgur.com/dNQOALO.jpg">
  </div>

</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="close" onclick="closePopup()">✕</div>

    <h2>Welcome</h2>

    <div id="loading">
      <div class="loader"></div>
    </div>

    <div id="content" class="content">
      <p>Please continue to proceed</p>

      <img src="https://www.imglnkx.com/8865/HawkTuah_Banners_GinaValentina_v1_300100.gif">

      <button class="btn" onclick="goLink()">Continue</button>
    </div>
  </div>
</div>

<script>ml
  let index = 0;
  const images = document.querySelectorAll(".slider img");

  setInterval(function() {
    images[index].classList.remove("active");
    index = (index + 1) % images.length;
    images[index].classList.add("active");
  }, 3000);

  function openPopup() {
    document.getElementById("overlay").style.display = "flex";

    setTimeout(function() {
      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
    }, 1500);
  }

  function closePopup() {
    document.getElementById("overlay").style.display = "none";
  }

  function goLink() {
    window.location.href = "https://bit.ly/4eOCHGi";
  }
</script>

</body>
</html>
