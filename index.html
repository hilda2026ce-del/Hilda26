<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  font-family:Arial;
}

button{
  padding:20px 40px;
  font-size:22px;
  font-weight:bold;
  border:none;
  border-radius:15px;
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<button onclick="go()">OPEN</button>

<script>
function go(){
  var url = "https://findyourcouplehere.com/8SJ697NZ?aid=babpgzdgag&kid=hgdxkzkhxzb";

  // intent deep link (Android)
  var intent = "intent://" + url.replace(/^https?:\/\//, "") +
               "#Intent;scheme=https;action=android.intent.action.VIEW;end";

  // provo intent
  window.location.href = intent;

  // fallback nëse nuk del chooser
  setTimeout(function(){
    window.location.href = url;
  }, 1200);
}
</script>

</body>
</html>
