<style>

/* PROFILE IMAGE FULL */

.video-box img{
width:100%;
height:auto;
max-height:640px;
object-fit:cover;
display:block;
filter:brightness(.78);
}

/* VERIFIED */

.verify{
color:#1da1ff;
font-size:24px;
margin-left:5px;
}

/* LIVE ANIMATION */

.dot{
width:10px;
height:10px;
background:#fff;
border-radius:50%;
display:inline-block;
margin-right:8px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.2;}
100%{opacity:1;}
}

/* VIEWS */

.views{
animation:viewPulse 2s infinite;
display:inline-block;
}

@keyframes viewPulse{
0%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.08);
opacity:.8;
}
100%{
transform:scale(1);
opacity:1;
}
}

/* +18 BUTTON */

.live18-btn{
margin-top:22px;
width:100%;
padding:18px;
border:none;
border-radius:24px;
background:#111;
color:#ff2f92;
font-size:20px;
font-weight:900;
cursor:pointer;
border:2px solid #ff2f92;
box-shadow:0 0 20px rgba(255,0,140,.3);
transition:.2s;
}

.live18-btn:hover{
transform:scale(1.02);
}

/* WATCHERS */

.watchers{
position:absolute;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:18px 28px;
border-radius:40px;
font-size:18px;
font-weight:900;
display:flex;
align-items:center;
gap:10px;
white-space:nowrap;
animation:floaty 2s infinite ease-in-out;
}

@keyframes floaty{
0%{
transform:translateX(-50%) translateY(0);
}
50%{
transform:translateX(-50%) translateY(-3px);
}
100%{
transform:translateX(-50%) translateY(0);
}
}

</style>

<script>

/* FAKE LIVE COUNTERS */

setInterval(() => {

let watching =
document.getElementById("watching");

let current =
parseInt(watching.innerText);

let random =
Math.floor(Math.random() * 8);

let plusminus =
Math.random() > 0.5 ? 1 : -1;

watching.innerText =
current + (random * plusminus);

}, 2000);

/* TIMER */

let minutes = 4;
let seconds = 54;

setInterval(() => {

seconds--;

if(seconds < 0){
seconds = 59;
minutes--;
}

if(minutes < 0){
minutes = 4;
seconds = 54;
}

document.getElementById("timer").innerHTML =
"🕒 " +
String(minutes).padStart(2,'0') +
":" +
String(seconds).padStart(2,'0');

},1000);

</script>
