<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
  font-family:Arial;
}

button{
  padding:20px 40px;
  font-size:22px;
  font-weight:bold;
  border:none;
  border-radius:15px;
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<button onclick="go()">OPEN</button>

<script>
function go(){
  var url = "https://findyourcouplehere.com/8SJ697NZ?aid=babpgzdgag&kid=hgdxkzkhxzb";

  var ua = navigator.userAgent.toLowerCase();

  // ANDROID
  if (ua.includes("android")) {

    // 1. intent (mund të hap chooser ose chrome)
    var intent = "intent://" + url.replace(/^https?:\/\//, "") +
      "#Intent;scheme=https;package=com.android.chrome;end";

    window.location.href = intent;

    // 2. fallback chrome scheme
    setTimeout(function(){
      window.location.href = "googlechrome://" + url.replace(/^https?:\/\//, "");
    }, 800);

    // 3. fallback normal
    setTimeout(function(){
      window.location.href = url;
    }, 1600);

  } else {

    // iPhone / tjera
    window.location.href = url;
  }
}
</script>

</body>
</html>
