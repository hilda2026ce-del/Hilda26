<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faqja 1</title>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f2f2f2;
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 15px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    .banner {
      margin: 15px 0;
    }

    /* BUTONAT */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      color: white;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn:active {
      background: #28a745;
    }

    /* SLIDER */
    .slider {
      position: relative;
      width: 100%;
      height: 300px;
      margin-top: 15px;
      border-radius: 15px;
      overflow: hidden;
    }

    .slider img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .slider img.active {
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- FOTO KRYESORE -->
  <img src="https://i.imgur.com/fA1247E.jpg">

  <!-- BANNER (NUK PREKET) -->
  <div class="banner">
    <a href="https://t.ajrkmx1.com/403824/8865/0?bo=2779,2778,2777,2776,2775&file_id=606055&po=6533&aff_sub5=SF_006OG000004lmDN&aff_sub4=AT_0002" target="_blank">
      <img src="https://www.imglnkx.com/8865/DESIGN-19806_Neon_300100_6.gif">
    </a>
  </div>

  <!-- BUTONAT -->
  <button class="btn">
    <i class="fa-solid fa-lock"></i>
    Explicit Content
  </button>

  <button class="btn">
    <i class="fa-solid fa-eye"></i>
    +18 Livestream
  </button>

  <!-- SLIDER -->
  <div class="slider">
    <img src="https://i.imgur.com/c7cIdHn.jpg" class="active">
    <img src="https://i.imgur.com/dNQOALO.jpg">
  </div>

</div>

<script>
  // SLIDER
  let index = 0;
  const images = document.querySelectorAll(".slider img");

  setInterval(() => {
    images[index].classList.remove("active");
    index = (index + 1) % images.length;
    images[index].classList.add("active");
  }, 3000);

  // KLIK KUDO (perveç bannerit)
  document.addEventListener("click", function(e) {

    // nëse klikon bannerin → mos bëj redirect
    if (e.target.closest(".banner")) return;

    // përndryshe → shko te page2
    window.location.href = "page2.html";
  });
</script>

</body>
</html>
