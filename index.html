<!-- Në kodin tënd ekzistues, mbaji të pandryshuara:
     - profilin
     - foton e profilit
     - bannerin
     - gallery / slider
     - CSS-in e dizajnit
-->

<!-- ZËVENDËSO VETËM PJESËN E BUTONAVE ME KËTË -->
<section class="buttons">
  <button class="action-button" type="button" data-open-modal>
    <span>View details</span>
  </button>

  <button class="action-button" type="button" data-open-modal>
    <span>Watch livestream</span>
  </button>
</section>

<!-- SHTO KËTË POPUP NJË HERË, PARA TAGUT </body> -->
<div class="modal-overlay" id="modalOverlay" aria-hidden="true">
  <section
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
  >
    <button
      id="modalClose"
      class="modal-close"
      type="button"
      aria-label="Mbyll popup-in"
    >
      ×
    </button>

    <h2 id="modalTitle">Continue</h2>
    <p>Click Continue to proceed.</p>

    <button id="continueButton" class="continue-button" type="button">
      CONTINUE
    </button>
  </section>
</div>

<style>
  /* Këto stile janë vetëm për popup-in; nuk prekin gallery-n. */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.62);
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    position: relative;
    width: min(100%, 390px);
    padding: 32px 24px 24px;
    border-radius: 18px;
    background: #ffffff;
    box-shadow: 0 20px 55px rgba(0, 0, 0, 0.35);
    color: #17146f;
    text-align: center;
  }

  .modal h2 {
    margin: 0 0 12px;
    font-size: 28px;
  }

  .modal p {
    margin: 0 0 22px;
    color: #3b3b3b;
    font-size: 16px;
    line-height: 1.45;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 12px;
    width: 34px;
    height: 34px;
    border: 0;
    border-radius: 50%;
    background: #eeeeee;
    color: #222222;
    cursor: pointer;
    font-size: 25px;
    line-height: 30px;
  }

  .continue-button {
    width: 100%;
    padding: 15px 20px;
    border: 0;
    border-radius: 12px;
    background: #1d63e8;
    color: #ffffff;
    cursor: pointer;
    font-size: 17px;
    font-weight: 800;
  }
</style>

<script>
  /*
    Ndrysho vetëm këtë URL me destinacionin tënd të përshtatshëm.
    Gallery, banneri dhe fotoja e profilit nuk preken nga ky script.
  */
  const POPUP_FINAL_LINK = "https://example.com";

  const modalOverlay = document.getElementById("modalOverlay");
  const modalClose = document.getElementById("modalClose");
  const continueButton = document.getElementById("continueButton");
  const buttons = document.querySelectorAll("[data-open-modal]");

  function openModal() {
    modalOverlay.classList.add("open");
    modalOverlay.setAttribute("aria-hidden", "false");
  }

  function closeModal() {
    modalOverlay.classList.remove("open");
    modalOverlay.setAttribute("aria-hidden", "true");
  }

  buttons.forEach(function (button) {
    button.addEventListener("click", openModal);
  });

  modalClose.addEventListener("click", closeModal);

  modalOverlay.addEventListener("click", function (event) {
    if (event.target === modalOverlay) {
      closeModal();
    }
  });

  continueButton.addEventListener("click", function () {
    window.location.assign(POPUP_FINAL_LINK);
  });

  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape") {
      closeModal();
    }
  });
</script>
