<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girls Live</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg') center/cover no-repeat;
filter:blur(8px);
transform:scale(1.1);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

.card{
width:92%;
max-width:420px;
background:#fff;
border-radius:28px;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:popup .5s ease;
position:relative;
}

@keyframes popup{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.top{
background:linear-gradient(90deg,#ff006a,#7b2cff);
padding:24px;
text-align:center;
position:relative;
}

.top h1{
color:#fff;
font-size:30px;
font-weight:800;
letter-spacing:1px;
}

.close{
position:absolute;
right:18px;
top:14px;
width:52px;
height:52px;
border:4px solid #fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:30px;
font-weight:bold;
cursor:pointer;
}

.image{
position:relative;
height:330px;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.fade{
position:absolute;
bottom:0;
left:0;
width:100%;
height:130px;
background:linear-gradient(to top,#fff,transparent);
}

.content{
padding:35px 28px;
text-align:center;
}

.content h2{
font-size:28px;
margin-bottom:28px;
font-weight:900;
color:#000;
}

.steps{
text-align:left;
margin-bottom:30px;
}

.step{
display:flex;
margin-bottom:22px;
font-size:18px;
font-weight:700;
color:#555;
line-height:1.4;
}

.number{
color:#ff0055;
font-size:22px;
font-weight:900;
margin-right:18px;
min-width:40px;
}

.join-btn{
width:100%;
border:none;
padding:24px;
border-radius:60px;
background:#00d65c;
color:#fff;
font-size:26px;
font-weight:900;
cursor:pointer;
box-shadow:0 0 25px rgba(0,214,92,.5);
transition:.2s;
animation:pulse 1.5s infinite;
}

.join-btn:hover{
transform:scale(1.03);
}

@keyframes pulse{
0%{
box-shadow:0 0 0 0 rgba(0,214,92,.7);
}
70%{
box-shadow:0 0 0 20px rgba(0,214,92,0);
}
100%{
box-shadow:0 0 0 0 rgba(0,214,92,0);
}
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:20px;
}

.popup-box{
background:#111;
width:100%;
max-width:360px;
border-radius:24px;
padding:30px;
text-align:center;
animation:popup .3s ease;
}

.popup-box h3{
color:#fff;
font-size:30px;
margin-bottom:15px;
}

.popup-box p{
color:#bbb;
font-size:18px;
margin-bottom:30px;
line-height:1.5;
}

.popup-btn{
display:block;
width:100%;
padding:18px;
border-radius:50px;
background:#00d65c;
color:#fff;
text-decoration:none;
font-size:24px;
font-weight:900;
}

.live{
position:absolute;
top:15px;
left:15px;
background:red;
color:#fff;
padding:8px 16px;
border-radius:30px;
font-weight:800;
font-size:14px;
animation:livepulse 1s infinite;
}

@keyframes livepulse{
0%{
opacity:1;
}
50%{
opacity:.4;
}
100%{
opacity:1;
}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="card">

<div class="top">
<h1>GIRLS LIVE</h1>
<div class="close">×</div>
</div>

<div class="image">
<div class="live">● LIVE NOW</div>

<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg">

<div class="fade"></div>
</div>

<div class="content">

<h2>Watch my content for Free</h2>

<div class="steps">

<div class="step">
<div class="number">1 -</div>
<div>Create a free account</div>
</div>

<div class="step">
<div class="number">2 -</div>
<div>Get the free Lifetime Membership</div>
</div>

<div class="step">
<div class="number">3 -</div>
<div>Enjoy me and thousands of more models</div>
</div>

</div>

<button class="join-btn" onclick="openPopup()">
→ JOIN FOR FREE
</button>

</div>
</div>

<div class="popup" id="popup">

<div class="popup-box">

<h3>Girls Live 🔥</h3>

<p>
You must create a free account to continue watching the live stream.
</p>

<a class="popup-btn"
href="https://a.vlmjm1.com/848772a1-0185-45ff-9e26-51fca699e698?aff_sub3=TC_LW9H5CT9&aff_id=403824&aff_sub5=SF_006OG00000LCnYj">
CONTINUE
</a>

</div>

</div>

<script>
function openPopup(){
document.getElementById("popup").style.display="flex";
}
</script>

</body>
</html>
