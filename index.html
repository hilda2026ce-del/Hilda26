<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarah 💕</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0a0013;
overflow:hidden;
color:#fff;
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url('https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg') center/cover no-repeat;
filter:blur(6px);
transform:scale(1.1);
z-index:-2;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
z-index:-1;
}

/* TOP BAR */

.topbar{
width:100%;
background:linear-gradient(90deg,#ff1d8e,#b22cff);
padding:22px;
text-align:center;
font-size:20px;
font-weight:900;
letter-spacing:2px;
box-shadow:0 0 25px rgba(255,0,140,.5);
}

/* MAIN */

.main{
padding:22px;
max-width:450px;
margin:auto;
}

/* PROFILE */

.profile-box{
display:flex;
align-items:center;
gap:18px;
margin-top:18px;
margin-bottom:28px;
}

.avatar{
position:relative;
width:105px;
height:105px;
border-radius:50%;
padding:4px;
background:linear-gradient(180deg,#ff1d8e,#ff4bc1);
box-shadow:0 0 25px rgba(255,0,120,.6);
}

.avatar img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
border:3px solid #111;
}

.live-tag{
position:absolute;
bottom:-5px;
left:50%;
transform:translateX(-50%);
background:#ff006a;
padding:7px 18px;
border-radius:12px;
font-size:14px;
font-weight:900;
border:2px solid #111;
display:flex;
align-items:center;
}

.live-dot{
width:9px;
height:9px;
background:#fff;
border-radius:50%;
margin-right:6px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.3;}
100%{opacity:1;}
}

.info h1{
font-size:34px;
font-weight:900;
margin-bottom:8px;
}

.verify{
color:#1da1ff;
font-size:24px;
vertical-align:middle;
}

.rating{
color:#ffd400;
font-size:19px;
font-weight:800;
margin-bottom:10px;
}

.stats{
color:#c5c5c5;
font-size:18px;
}

/* VIDEO BOX */

.video-box{
position:relative;
margin-top:15px;
border-radius:34px;
overflow:hidden;
background:#111;
box-shadow:0 0 35px rgba(255,0,140,.25);
border:1px solid rgba(255,255,255,.08);
}

.video-box img{
width:100%;
display:block;
height:640px;
object-fit:cover;
object-position:center top;
filter:brightness(.72);
}

.live-now{
position:absolute;
top:22px;
left:22px;
background:#ff006a;
padding:12px 22px;
border-radius:16px;
font-weight:900;
font-size:16px;
box-shadow:0 0 20px rgba(255,0,120,.6);
display:flex;
align-items:center;
}

.timer{
position:absolute;
top:22px;
right:22px;
background:#111;
padding:12px 18px;
border-radius:14px;
font-size:16px;
font-weight:800;
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
border-radius:50%;
background:#ff1d8e;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
cursor:pointer;
box-shadow:0 0 40px rgba(255,0,120,.65);
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{
box-shadow:0 0 0 0 rgba(255,0,120,.7);
}
70%{
box-shadow:0 0 0 30px rgba(255,0,120,0);
}
100%{
box-shadow:0 0 0 0 rgba(255,0,120,0);
}
}

.watchers{
position:absolute;
bottom:22px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:18px 28px;
border-radius:40px;
font-size:18px;
font-weight:900;
display:flex;
align-items:center;
gap:12px;
}

/* +18 BUTTON */

.live18-btn{
margin-top:18px;
width:100%;
padding:18px;
border:none;
border-radius:24px;
background:#111;
color:#ff2f92;
font-size:20px;
font-weight:900;
border:2px solid #ff2f92;
cursor:pointer;
}

/* BUTTON */

.join-btn{
margin-top:18px;
width:100%;
padding:26px;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#ff1d8e,#b22cff);
color:#fff;
font-size:24px;
font-weight:900;
cursor:pointer;
box-shadow:0 0 35px rgba(255,0,140,.45);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.82);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
backdrop-filter:blur(5px);
}

.popup-box{
width:100%;
max-width:350px;
background:#fff;
border-radius:28px;
overflow:hidden;
animation:popup .3s ease;
}

@keyframes popup{
from{
transform:scale(.85);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.popup-top{
background:linear-gradient(90deg,#ff1d8e,#b22cff);
padding:22px;
text-align:center;
position:relative;
}

.popup-top h1{
color:#fff;
font-size:26px;
font-weight:900;
}

.close{
position:absolute;
right:15px;
top:10px;
width:46px;
height:46px;
border:3px solid #fff;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
font-weight:bold;
color:#fff;
cursor:pointer;
}

.popup-img{
position:relative;
height:240px;
overflow:hidden;
}

.popup-img img{
width:100%;
height:100%;
object-fit:cover;
}

.fade{
position:absolute;
bottom:0;
left:0;
width:100%;
height:100px;
background:linear-gradient(to top,#fff,transparent);
}

.popup-content{
padding:28px 22px;
text-align:center;
}

.popup-content h2{
font-size:22px;
color:#000;
margin-bottom:25px;
font-weight:900;
}

.steps{
text-align:left;
margin-bottom:22px;
}

.step{
display:flex;
margin-bottom:16px;
font-size:16px;
font-weight:700;
color:#555;
line-height:1.4;
}

.number{
color:#ff0055;
font-size:20px;
font-weight:900;
margin-right:12px;
min-width:30px;
}

.popup-btn{
display:block;
width:100%;
padding:20px;
border-radius:50px;
background:#00d65c;
color:#fff;
text-decoration:none;
font-size:24px;
font-weight:900;
box-shadow:0 0 25px rgba(0,214,92,.45);
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="topbar">
LIVE IS FREE
</div>

<div class="main">

<div class="profile-box">

<div class="avatar">
<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg">

<div class="live-tag">
<span class="live-dot"></span>
LIVE
</div>

</div>

<div class="info">
<h1>
Sarah 💕
<span class="verify">
<i class="fa-solid fa-circle-check"></i>
</span>
</h1>

<div class="rating">
5.0 ★★★★★ (4.9k)
</div>

<div class="stats">
375 videos • 891 photos
</div>

</div>
</div>

<div class="video-box">

<div class="live-now">
<span class="live-dot"></span>
LIVE NOW
</div>

<div class="timer">
🕒 04:54
</div>

<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg">

<div class="play" onclick="openPopup()">
▶
</div>

<div class="watchers">
👁 WATCHING NOW:
<span id="watching">1521</span>
</div>

</div>

<button class="live18-btn" onclick="openPopup()">
🔞 +18 LIVESTREAM
</button>

<button class="join-btn" onclick="openPopup()">
JOIN FREE TO WATCH
</button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<div class="popup-top">

<h1>Sarah 💕</h1>

<div class="close" onclick="closePopup()">
×
</div>

</div>

<div class="popup-img">

<img src="https://i.ibb.co/Y70sp3Gv/IMG-2446.jpg">

<div class="fade"></div>

</div>

<div class="popup-content">

<h2>Watch my content for Free</h2>

<div class="steps">

<div class="step">
<div class="number">1 -</div>
<div>Create a free account</div>
</div>

<div class="step">
<div class="number">2 -</div>
<div>Get the free Lifetime Membership</div>
</div>

<div class="step">
<div class="number">3 -</div>
<div>Enjoy me and thousands of more models</div>
</div>

</div>

<a class="popup-btn"
href="https://t.ajrkmx1.com/407489/6224/0?po=6533&aff_sub5=SF_006OG000004lmDN">

→ JOIN FOR FREE

</a>

</div>
</div>
</div>

<script>

function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

setInterval(() => {

let el =
document.getElementById("watching");

let num =
parseInt(el.innerText);

num += Math.floor(Math.random()*5)-2;

el.innerText = num;

},2000);

</script>

</body>
</html>
